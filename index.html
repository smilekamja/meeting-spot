<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중간 약속장소 찾기</title>
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=2075bbdc94c0ff77ec341ffa77001023&libraries=services"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
    header{background:#fff;border-bottom:1px solid #e0e0e0;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    header h1{font-size:18px;font-weight:700}
    .badge{font-size:11px;background:#0071e3;color:#fff;padding:2px 8px;border-radius:20px}
    .layout{display:grid;grid-template-columns:370px 1fr;height:calc(100vh - 53px)}
    .sidebar{background:#fff;border-right:1px solid #e0e0e0;overflow-y:auto;display:flex;flex-direction:column}
    .sec{padding:16px 18px;border-bottom:1px solid #f0f0f0}
    .sec h2{font-size:10px;font-weight:700;color:#8e8e93;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
    input[type=text]{padding:9px 12px;border:1px solid #d2d2d7;border-radius:8px;font-size:13px;width:100%;font-family:inherit}
    input:focus{outline:none;border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.15)}
    .btn{padding:9px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .btn-primary{background:#0071e3;color:#fff}
    .btn-primary:hover:not(:disabled){background:#0077ed}
    .btn-secondary{background:#f0f0f3;color:#1d1d1f}
    .btn-secondary:hover{background:#e5e5ea}
    .btn-sm{padding:7px 13px;font-size:12px}
    .row{display:flex;gap:8px}
    .p-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;min-height:20px}
    .p-item{display:flex;align-items:center;gap:9px;background:#f5f5f7;border-radius:10px;padding:9px 12px}
    .p-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .p-info{flex:1;min-width:0}
    .p-name{font-size:13px;font-weight:600}
    .p-loc{font-size:11px;color:#8e8e93;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-x{background:none;border:none;color:#c7c7cc;cursor:pointer;font-size:18px;line-height:1;padding:2px 5px;flex-shrink:0}
    .btn-x:hover{color:#ff3b30}
    .add-form{display:flex;flex-direction:column;gap:8px;padding-top:4px}
    .sr-wrap{position:relative}
    .sr{background:#fff;border:1px solid #d2d2d7;border-radius:8px;max-height:200px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1);position:absolute;width:100%;z-index:300}
    .sr.on{display:block}
    .sri{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #f5f5f7}
    .sri:last-child{border-bottom:none}
    .sri:hover{background:#f0f7ff}
    .sri small{font-size:11px;color:#8e8e93;display:block;margin-top:1px}
    #btn-find{margin:14px 18px;width:calc(100% - 36px);padding:13px;font-size:15px}
    .results-wrap{padding:0 18px 24px;flex:1}
    .status{font-size:12px;color:#8e8e93;min-height:18px;margin-bottom:8px}
    .rc{background:#f5f5f7;border-radius:12px;padding:14px 15px;margin-bottom:9px;cursor:pointer;border:2px solid transparent;transition:all .15s}
    .rc:hover{background:#ebebed}
    .rc.sel{border-color:#0071e3;background:#eaf2ff}
    .r-rank{font-size:11px;font-weight:700;color:#0071e3;margin-bottom:3px}
    .r-name{font-size:17px;font-weight:700;margin-bottom:6px}
    .r-lines{display:flex;gap:4px;margin-bottom:9px;flex-wrap:wrap}
    .lb{font-size:10px;font-weight:700;color:#fff;padding:2px 7px;border-radius:10px}
    .r-stats{display:flex;gap:14px}
    .stat{display:flex;flex-direction:column;gap:1px}
    .stat-l{font-size:10px;color:#8e8e93}
    .stat-v{font-size:13px;font-weight:700}
    .r-detail{margin-top:10px;padding-top:10px;border-top:1px solid #d2d2d7;display:none}
    .rc.sel .r-detail{display:block}
    .dr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
    .dr-l{display:flex;align-items:center;gap:6px}
    .dd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .empty{text-align:center;padding:20px 0;color:#8e8e93;font-size:13px}
    #map{width:100%;height:100%}
    .p-marker,.r-marker{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    @media(max-width:768px){
      .layout{grid-template-columns:1fr;grid-template-rows:auto 320px;height:auto}
      #map{height:320px}
    }
  </style>
</head>
<body>
<header>
  <span style="font-size:22px">🚇</span>
  <h1>중간 약속장소 찾기</h1>
  <span class="badge">지하철 기준</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="sec">
      <h2>참여자</h2>
      <div class="p-list" id="p-list"><div class="empty">아래 버튼으로 참여자를 추가하세요</div></div>
      <div id="add-form" class="add-form" style="display:none">
        <input type="text" id="p-name" placeholder="이름 (선택, 예: 민준)" />
        <div class="sr-wrap">
          <input type="text" id="p-search" placeholder="출발지 검색 (역, 주소, 건물명)" autocomplete="off" />
          <div class="sr" id="sr"></div>
        </div>
        <div class="row">
          <button class="btn btn-primary btn-sm" id="btn-ok">추가</button>
          <button class="btn btn-secondary btn-sm" id="btn-cancel">취소</button>
        </div>
      </div>
      <button class="btn btn-secondary" id="btn-add" style="width:100%;margin-top:8px">+ 참여자 추가</button>
    </div>
    <button class="btn btn-primary" id="btn-find" disabled>🔍 최적 약속장소 찾기</button>
    <div class="results-wrap">
      <div class="status" id="status"></div>
      <div id="results"></div>
    </div>
  </aside>
  <div id="map"></div>
</div>

// ── 다익스트라 ───────────────────────────────────────
function dijkstra(start,end){
  if(!stLines[start]||!stLines[end])return null;
  const dist={},visited=new Set(),pq=[];
  for(const line of stLines[start]){const k=`${start}|${line}`;dist[k]=0;pq.push([0,0,k]);}
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
    const[d,tr,cur]=pq.shift();
    if(visited.has(cur))continue;visited.add(cur);
    const[curSt]=cur.split('|');
    if(curSt===end)return{time:d,transfers:tr};
    for(const e of(graph[cur]||[])){
      const nd=d+e.time,ntr=tr+(e.isTr?1:0);
      if(nd<(dist[e.to]??Infinity)){dist[e.to]=nd;pq.push([nd,ntr,e.to]);}
    }
  }
  return null;
}

function haversine(la1,lo1,la2,lo2){
  const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function nearestStation(lat,lng){
  let best=null,bestD=Infinity;
  for(const[name,c]of Object.entries(stCoord)){
    const d=haversine(lat,lng,c.lat,c.lng);
    if(d<bestD){bestD=d;best=name;}
  }
  return best;
}

function doSearch(kw){

      el.innerHTML='<div class="sri" style="color:#8e8e93">결과 없음</div>';
      el.classList.add('on');return;
    }

      div.className='sri';

function findSpot(){
  if(participants.length<2)return;
  document.getElementById('btn-find').disabled=true;
  document.getElementById('results').innerHTML='';
  const clat=participants.reduce((s,p)=>s+p.loc.lat,0)/participants.length;
  const clng=participants.reduce((s,p)=>s+p.loc.lng,0)/participants.length;
  const maxR=Math.max(...participants.map(p=>haversine(clat,clng,p.loc.lat,p.loc.lng)));
  const radius=Math.min(maxR*2+8,35);
  const cands=CANDIDATES.filter(c=>haversine(clat,clng,stCoord[c.n].lat,stCoord[c.n].lng)<=radius);
  setStatus(`후보 ${cands.length}개역 계산 중…`);
  const scored=[];
  for(const c of cands){
    const routes=participants.map(p=>{const ns=nearestStation(p.loc.lat,p.loc.lng);return dijkstra(ns,c.n);});
    if(routes.some(r=>!r))continue;
    const times=routes.map(r=>r.time),trs=routes.map(r=>r.transfers);
    scored.push({cand:c,routes:routes.map((r,i)=>({p:participants[i],...r})),
      maxTime:Math.max(...times),sumTime:times.reduce((a,b)=>a+b,0),
      maxTr:Math.max(...trs),sumTr:trs.reduce((a,b)=>a+b,0)});
  }
  scored.sort((a,b)=>a.maxTime!==b.maxTime?a.maxTime-b.maxTime:a.sumTr-b.sumTr);
  const top=scored.slice(0,10);
  if(kakaoMap)clearResultOverlays();
  renderResults(top);
  if(kakaoMap)showOnMap(top.slice(0,3));
  setStatus('');document.getElementById('btn-find').disabled=false;
}

// ── 결과 렌더링 ──────────────────────────────────────
function renderResults(top){
  const el=document.getElementById('results');
  if(!top.length){el.innerHTML='<div class="empty">경로를 찾을 수 없습니다.</div>';return;}
  el.innerHTML=top.map((r,i)=>{
    const lines=r.cand.lines.map(l=>`<span class="lb" style="background:${LINE_COLORS[l]||'#888'}">${l}호선</span>`).join('');
    const details=r.routes.map((rt,j)=>`
      <div class="dr"><div class="dr-l"><div class="dd" style="background:${COLORS[j%COLORS.length]}"></div><span>${rt.p.name}</span></div>
      <span>${rt.time}분 · 환승 ${rt.transfers}회</span></div>`).join('');
    return`<div class="rc" id="rc-${i}" onclick="selCard(${i},${stCoord[r.cand.n].lat},${stCoord[r.cand.n].lng})">
      <div class="r-rank">${i===0?'🏆 최적 장소':`#${i+1}`}</div>
      <div class="r-name">${r.cand.n}역</div>
      <div class="r-lines">${lines}</div>
      <div class="r-stats">
        <div class="stat"><span class="stat-l">최대 이동시간</span><span class="stat-v">${r.maxTime}분</span></div>
        <div class="stat"><span class="stat-l">총 이동시간</span><span class="stat-v">${r.sumTime}분</span></div>
        <div class="stat"><span class="stat-l">최대 환승</span><span class="stat-v">${r.maxTr}회</span></div>
      </div>
      <div class="r-detail">${details}</div></div>`;
  }).join('');
}
function selCard(i,lat,lng){
  document.querySelectorAll('.rc').forEach(e=>e.classList.remove('sel'));
  document.getElementById(`rc-${i}`).classList.add('sel');
  if(kakaoMap){kakaoMap.setCenter(new kakao.maps.LatLng(lat,lng));kakaoMap.setLevel(6);}
}
function showOnMap(top){
  top.forEach((r,i)=>{
    const c=stCoord[r.cand.n],size=i===0?40:32,bg=i===0?'#0071e3':'#555',label=i===0?'★':i+1;
    const ov=makeOverlay(c.lat,c.lng,
      `<div class="r-marker" style="background:${bg};width:${size}px;height:${size}px;font-size:${i===0?16:13}px;border:2px solid #fff">${label}</div>`);
    overlays.push({id:`res-${i}`,ov,isResult:true});
  });
  const bounds=new kakao.maps.LatLngBounds();
  participants.forEach(p=>bounds.extend(new kakao.maps.LatLng(p.loc.lat,p.loc.lng)));
  top.forEach(r=>{const c=stCoord[r.cand.n];bounds.extend(new kakao.maps.LatLng(c.lat,c.lng));});
  kakaoMap.setBounds(bounds,60);
}
function setStatus(msg){document.getElementById('status').textContent=msg;}
</script>
